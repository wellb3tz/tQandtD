<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Procedural World Engine - 3D Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      background: #000;
    }
    
    #canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    
    #ui {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      background: rgba(0, 0, 0, 0.7);
      padding: 15px;
      border-radius: 8px;
      font-size: 14px;
      max-width: 300px;
      backdrop-filter: blur(10px);
    }
    
    #ui h1 {
      font-size: 18px;
      margin-bottom: 10px;
    }
    
    #ui p {
      margin: 5px 0;
      line-height: 1.4;
    }
    
    .controls {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .control-group {
      margin: 10px 0;
    }
    
    .control-group label {
      display: block;
      margin-bottom: 5px;
      font-size: 12px;
      opacity: 0.8;
    }
    
    input[type="number"] {
      width: 100%;
      padding: 5px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: white;
      border-radius: 4px;
    }
    
    button {
      width: 100%;
      padding: 8px;
      margin-top: 10px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    
    button:hover {
      background: #45a049;
    }
    
    #stats {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  
  <div id="ui">
    <h1>🌍 Procedural World 3D</h1>
    <p>WASD - Move | Mouse - Look | Space - Up | Shift - Down</p>
    
    <div class="controls">
      <div class="control-group">
        <label>Seed:</label>
        <input type="number" id="seedInput" value="12345">
      </div>
      <button id="regenerate">Regenerate World</button>
    </div>
    
    <div id="stats">
      <p>Chunks loaded: <span id="chunkCount">0</span></p>
      <p>FPS: <span id="fps">60</span></p>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
